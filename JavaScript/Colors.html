<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="hello">Hello</h1>
    <button data-color ="Red" onclick="Red()">Rosso</button>
    <button data-color="Blue" onclick="Blue()">Blu</button>
    <button data-color="Green" onclick="Green()">Verde</button>
    <button data-color="Grey" onclick="Grey()">Grigio</button>
    <button data-color="Black" onclick="Black()">Preto</button>

    <script>
        let hello = document.getElementById("hello");
        document.querySelectorAll("button").forEach((button) => {
        console.log(button);
        button.onclick = () => {
            hello.style.color = button.dataset.color;
        }           
        });
    </script>
</body>
</html>
