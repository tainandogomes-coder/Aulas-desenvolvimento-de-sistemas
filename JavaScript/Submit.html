<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Escreva o seu nome</h1>
    <form onsubmit="hello()">
        <input id="nome" name="nome" type="text">
        <input type="submit">
    </form>
    <script>
        function hello(){
            let nome = document.querySelector("#nome").value;
            alert(`Olá, ${nome}`); 
        }
    </script>
</body>
</html>
